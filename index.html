  --line:rgba(15,46,32,0.18);

img,svg{display:block;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:1rem;}
.mono{font-family:'IBM Plex Mono',monospace;}

#app{max-width:900px;margin:0 auto;padding:clamp(28px,4vw,48px) 20px 80px;}
#app.home-active{padding:0;}

.topbar{background:var(--ink);color:var(--paper-light);padding:14px 20px;}
.topbar-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.brand{font-family:'Train One',sans-serif;font-size:1.5rem;letter-spacing:.06em;text-transform:uppercase;}
.brand span{color:inherit;}
nav.tabs{display:flex;gap:4px;flex-wrap:wrap;}
nav.tabs button{background:none;border:1px solid transparent;color:var(--paper-light);padding:7px 12px;border-radius:3px;font-size:.92rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;opacity:.8;}
nav.tabs button:hover{opacity:1;border-color:rgba(232,225,206,.3);}
nav.tabs button.active{opacity:1;background:var(--ochre);color:var(--ink);font-weight:600;}

.hero{background:var(--ink);color:var(--paper-light);margin:0 -20px 0;padding:44px 20px 36px;position:relative;background-image:radial-gradient(circle at 15% 20%,rgba(255,255,255,.035),transparent 40%),radial-gradient(circle at 85% 70%,rgba(255,255,255,.03),transparent 45%);border-radius:24px;overflow:hidden;}
.hero-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ochre);margin-bottom:10px;}
.hero h1{font-family:'Kavivanar',cursive;font-weight:700;font-size:clamp(2rem,5vw,3rem);line-height:1.1;margin:0 0 12px;text-shadow:0 0 1px rgba(255,255,255,.25);}
.hero p.tagline{max-width:520px;color:var(--paper-light);font-size:1.05rem;margin:0 0 22px;}
.hero-session-card{background:rgba(232,225,206,.06);border:1px solid rgba(232,225,206,.22);border-radius:6px;padding:16px 18px;max-width:460px;}
.hero-session-card .label{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);margin-bottom:6px;}
.hero-session-date{font-size:1.25rem;font-weight:600;margin-bottom:8px;}
.hero-session-empty{color:var(--paper-dark);font-style:italic;}

h2.section-title{font-family:'Kavivanar',cursive;font-size:1.6rem;font-weight:700;margin:0 0 6px;color:var(--espresso);}
p.section-sub{color:var(--espresso);opacity:.75;margin:0 0 22px;max-width:560px;}
.hairline{border:none;border-top:1px solid var(--line);margin:28px 0;}
.card{background:var(--paper-light);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:16px;}

.event-card{display:grid;grid-template-columns:64px 1fr auto;gap:16px;align-items:start;background:var(--paper-light);border:1px solid var(--line);border-radius:6px;padding:18px 20px;margin-bottom:14px;}
@media(max-width:640px){.event-card{grid-template-columns:1fr;}}
.event-num{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--ochre-dark);line-height:1;}
.event-main .date{font-weight:700;font-size:1.15rem;}
.event-main .label{color:var(--espresso);opacity:.8;margin:2px 0 8px;}
.event-meta{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--espresso);opacity:.75;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.cup-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.cup-icon{width:22px;height:22px;overflow:visible;flex:none;}
.cup-body{fill:rgba(228,217,192,.15);stroke:var(--paper-dark);stroke-width:2.2;stroke-linejoin:round;}
.cup-icon.is-filled .cup-body{fill:var(--ochre);stroke:var(--paper-light);opacity:1;}
.cup-handle,.cup-base{fill:none;stroke:var(--paper-dark);stroke-width:2.2;stroke-linecap:round;}
.cup-icon.is-filled .cup-handle,.cup-icon.is-filled .cup-base{stroke:var(--paper-light);opacity:1;}
.fill-bar{height:10px;border:1px solid var(--espresso);border-radius:2px;overflow:hidden;width:180px;background:var(--paper);}
.fill-bar-inner{height:100%;background:var(--ochre);}

.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:3px 8px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;}
.badge-open{background:rgba(95,111,78,.15);color:var(--sage);}
.badge-closed{background:rgba(156,74,52,.15);color:var(--brick);}
.badge-full{background:rgba(156,74,52,.15);color:var(--brick);}
.badge-pending{background:rgba(189,139,46,.18);color:var(--ochre-dark);}
.badge-approved{background:rgba(95,111,78,.15);color:var(--sage);}

.btn{display:inline-block;background:var(--espresso);color:var(--paper-light);border:none;padding:10px 16px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;letter-spacing:.02em;}
.btn:hover{background:var(--ink);}
.btn:disabled{background:var(--line-strong);color:var(--paper);cursor:not-allowed;}
.btn-outline{background:none;border:1px solid var(--espresso);color:var(--espresso);}
.btn-outline:hover{background:var(--espresso);color:var(--paper-light);}
.btn-small{padding:6px 10px;font-size:.75rem;}
.btn-danger{background:none;border:1px solid var(--brick);color:var(--brick);}
.btn-danger:hover{background:var(--brick);color:#fff;}

.field{margin-bottom:14px;}
.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;color:var(--espresso);opacity:.8;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:4px;background:var(--paper-light);color:var(--espresso);}
.field textarea{min-height:80px;resize:vertical;}
.field-hint{font-size:.8rem;opacity:.65;margin-top:4px;}
.field-error{font-size:.8rem;color:var(--brick);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.field input.invalid,.field select.invalid,.field textarea.invalid{border-color:var(--brick);}
.checkbox-list{display:flex;flex-direction:column;gap:6px;}
.checkbox-list label{display:flex;align-items:center;gap:8px;font-family:'Source Serif 4',serif;text-transform:none;letter-spacing:0;font-size:.95rem;opacity:1;}
.checkbox-list input{width:auto;}
.form-panel{background:var(--paper);border:1px dashed var(--line-strong);border-radius:6px;padding:18px;margin-top:12px;}
.notice{padding:12px 14px;border-radius:4px;margin-bottom:16px;font-size:.92rem;}
.notice-success{background:rgba(95,111,78,.15);border:1px solid var(--sage);color:var(--sage);}
.notice-error{background:rgba(156,74,52,.12);border:1px solid var(--brick);color:var(--brick);}
.how-it-works{
  background:var(--ink);
  background-image:radial-gradient(circle at 85% 30%,rgba(255,255,255,.035),transparent 40%),radial-gradient(circle at 15% 80%,rgba(255,255,255,.03),transparent 45%);
  color:var(--paper-light);
  margin:24px -20px 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  border-radius:24px;
  overflow:hidden;
}
.how-it-works-img{
  min-height:380px;
  background:url('cafe-photo.jpeg') center center / cover no-repeat;
}
.how-it-works-copy{
  padding:48px 40px;
}
.how-it-works-copy h2{
  font-family:'Kavivanar',cursive;
  font-size:1.6rem;
  margin:0 0 16px;
  color:var(--paper-light);
}
.how-it-works-copy p{
  font-size:1rem;
  line-height:1.7;
  opacity:.88;
  margin:0 0 14px;
}
.how-it-works-copy p:last-child{margin:0;}
@media(max-width:640px){
  .how-it-works{grid-template-columns:1fr;}
  .how-it-works-img{min-height:240px;}
  .how-it-works-copy{padding:32px 20px;}
}
table.admin-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.9rem;}
table.admin-table th,table.admin-table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
table.admin-table th{font-family:'IBM Plex Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;opacity:.7;}
.admin-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.admin-subnav button{background:var(--paper-light);border:1px solid var(--line-strong);padding:8px 14px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.82rem;}
.admin-subnav button.active{background:var(--espresso);color:var(--paper-light);}
.footer{text-align:center;padding:30px 20px 10px;font-family:'IBM Plex Mono',monospace;font-size:.75rem;opacity:.55;}
.loading-line{font-family:'IBM Plex Mono',monospace;opacity:.6;padding:40px 0;text-align:center;}

/* ===================== Home screen ===================== */
.home-view{background:#1b1b13;color:#f0ead8;width:auto;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw);padding:0 0 56px;}
.home-hero{position:relative;width:100%;background:url('hero-cups.jpg') 0% 32%/137.5% auto no-repeat;padding:20px clamp(20px,5vw,80px) 56px;aspect-ratio:1440/900;min-height:320px;max-height:max(900px,65vh);display:flex;flex-direction:column;box-sizing:border-box;}
.home-nav{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.home-brand{font-family:'Train One',sans-serif;font-size:clamp(1.1rem,2.2vw,2rem);letter-spacing:.04em;text-transform:uppercase;color:#0f2e20;}
.home-nav--flat .home-brand{color:#f0ead8;}
.home-nav-links{display:flex;gap:24px;flex-wrap:wrap;}
.home-nav-links button{background:none;border:none;color:#f0ead8;font-family:'Source Serif 4',serif;font-size:clamp(.85rem,1.65vw,1.5rem);padding:8px 12px;border-radius:6px;opacity:.92;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.home-nav-links button:hover{background:rgba(240,234,216,.18);opacity:1;}
.home-hamburger{display:none;background:none;border:none;padding:8px;cursor:pointer;color:#f0ead8;filter:drop-shadow(0 1px 3px rgba(0,0,0,.35));}
.home-hamburger svg{width:26px;height:26px;display:block;}
.home-hamburger .ham-icon-close{display:none;}
.home-hamburger.is-open .ham-icon-open{display:none;}
.home-hamburger.is-open .ham-icon-close{display:block;}
@media(max-width:640px){
  .home-hamburger{display:block;}
  .home-nav-links{display:none;position:absolute;top:100%;right:0;margin-top:8px;flex-direction:column;flex-wrap:nowrap;background:#1b1b13;border:1px solid rgba(240,234,216,.25);border-radius:8px;padding:6px;min-width:200px;z-index:20;gap:2px;}
  .home-nav-links.is-open{display:flex;}
  .home-nav-links button{width:100%;text-align:left;}
}
.home-hero-tagline{position:absolute;left:11%;top:47%;font-family:'Source Serif 4',serif;font-size:clamp(1.1rem,2.2vw,2rem);line-height:1.25;color:#1b1b13;white-space:nowrap;}
.home-hero-tagline .tagline-line{display:block;}
@media(max-width:900px){
  .home-hero-tagline{font-size:clamp(.8rem,3.2vw,1.4rem);}
}
@media(max-width:640px){
  .home-hero-tagline{
    left:0;
    right:0;
    width:100%;
    box-sizing:border-box;
    top:50%;
    transform:translateY(-50%);
    font-size:clamp(.75rem,3.8vw,1.05rem);
    color:#f0ead8;
    background:rgba(27,27,19,.25);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    padding:10px clamp(20px,5vw,80px);
  }
  .home-hero-tagline .tagline-line{display:inline;}
}
.home-sub{font-family:'Source Sans 3',sans-serif;font-size:1.25rem;width:calc(100% - 40px);max-width:950px;margin:80px auto 0;}
.home-grid{display:flex;gap:40px;flex-wrap:wrap;justify-content:space-between;width:calc(100% - 40px);max-width:950px;margin:80px auto 0;}
.home-col{flex:1 1 300px;min-width:260px;display:flex;flex-direction:column;justify-content:space-between;}
.home-eyebrow{font-family:'Source Code Pro',monospace;font-size:.95rem;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;display:inline-block;margin-bottom:18px;}
.home-session-card{border:1px solid #f0ead8;border-radius:24px;padding:16px;display:flex;gap:18px;max-width:440px;}
.home-session-date{font-family:'Source Serif 4',serif;font-size:1.4rem;text-align:right;flex-shrink:0;line-height:1.15;white-space:nowrap;}
.home-session-body{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0;container-type:inline-size;}
.home-session-title{font-family:'Source Serif 4',serif;font-size:1.1rem;}
.home-session-notes{font-family:'Source Serif 4',serif;font-size:.95rem;opacity:.85;margin-top:2px;}
.home-session-meta{font-family:'Source Sans 3',sans-serif;font-size:.9rem;display:flex;gap:8px;flex-wrap:nowrap;opacity:.9;}
@container (max-width: 280px) {
  .home-session-meta{flex-direction:column;align-items:flex-start;gap:2px;}
  .home-session-meta .meta-dot{display:none;}
}
.home-btn{display:inline-block;align-self:flex-end;background:#e4d9c0;color:#1b1b13;border:none;padding:8px 14px;border-radius:6px;font-family:'Source Serif 4',serif;font-size:.95rem;cursor:pointer;}
.home-btn:hover{background:#f0ead8;}
.home-btn-outline{display:inline-block;background:none;border:2px solid #f0ead8;color:#f0ead8;padding:6px 13px;border-radius:6px;font-family:'Source Serif 4',serif;font-size:.95rem;cursor:pointer;}
.home-btn-outline:hover{background:rgba(240,234,216,.12);}
.home-session-note{font-family:'IBM Plex Mono',monospace;font-size:.8rem;opacity:.75;}
.home-propose-copy{font-family:'Source Serif 4',serif;font-size:1.05rem;line-height:1.5;margin:0;}
.home-propose-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.home-how{display:flex;flex-wrap:wrap;width:calc(100% - 40px);max-width:950px;margin:112px auto 0;border-radius:24px;overflow:hidden;}
.home-how-img{flex:1 1 300px;min-height:300px;background:url('coffee-overhead.png') center/cover no-repeat;}
.home-how-copy{flex:1 1 300px;background:#2f2f25;padding:32px;display:flex;flex-direction:column;gap:18px;justify-content:center;}
.home-how-copy p{font-family:'Source Serif 4',serif;font-size:1rem;line-height:1.6;margin:0 0 14px;}
.home-how-copy p:last-child{margin:0;}
.home-footer{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px;text-align:center;width:calc(100% - 40px);max-width:950px;margin:80px auto 0;font-family:'Source Code Pro',monospace;font-size:.85rem;}
.home-footer .dotted{text-decoration:underline dotted;text-underline-offset:3px;}
@media(max-width:640px){
  .home-footer{flex-direction:column;gap:8px;}
  .home-footer .footer-dot{display:none;}
}
@media(max-width:640px){.home-hero{padding:16px 16px 40px;}}
.home-nav-links button.is-active{text-decoration:underline dotted;text-underline-offset:3px;}

/* ===================== Dark page chrome (shared, non-hero pages) ===================== */
.sess-header{padding:20px clamp(20px,5vw,80px) 0;}
.sess-title{font-family:'Source Serif 4',serif;font-size:clamp(1.4rem,3vw,2rem);color:#f0ead8;text-align:center;width:calc(100% - 40px);max-width:950px;margin:40px auto 0;}
.sess-next{display:flex;flex-wrap:wrap;width:calc(100% - 40px);max-width:950px;margin:56px auto 0;border-radius:24px;overflow:hidden;}
.sess-next-img{flex:1 1 300px;min-height:300px;background:url('session-photo.jpg') center/cover no-repeat;}
.sess-next-copy{flex:1 1 300px;background:#2f2f25;padding:32px;display:flex;flex-direction:column;gap:24px;justify-content:center;}
.sess-list{width:calc(100% - 40px);max-width:950px;margin:40px auto 0;display:flex;flex-direction:column;gap:16px;}
.sess-row{background:#2f2f25;border:1px solid #f0ead8;border-radius:12px;padding:20px clamp(16px,3vw,40px);}
.sess-row-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.sess-row-info{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.sess-row-date,.sess-row-name{font-family:'Source Serif 4',serif;font-size:1.2rem;color:#f0ead8;}
.sess-row-seats{font-family:'Source Sans 3',sans-serif;font-size:.95rem;color:#f0ead8;opacity:.9;}
.sess-empty{font-family:'Source Sans 3',sans-serif;color:#f0ead8;opacity:.85;width:calc(100% - 40px);max-width:950px;margin:40px auto 0;}

.form-panel-dark{background:#1b1b13;border:1px dashed rgba(240,234,216,.3);border-radius:6px;padding:18px;margin-top:16px;color:#f0ead8;}
.form-panel-dark p{color:#f0ead8;}
.form-panel-dark .field label{color:#f0ead8;opacity:.8;font-family:'IBM Plex Mono',monospace;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block;}
.form-panel-dark .field input,.form-panel-dark .field select,.form-panel-dark .field textarea{background:#2f2f25;color:#f0ead8;border:1px solid rgba(240,234,216,.35);border-radius:4px;padding:9px 11px;width:100%;box-sizing:border-box;font-family:'Source Sans 3',sans-serif;}
.form-panel-dark .field textarea{min-height:80px;resize:vertical;}
.form-panel-dark .field-hint{font-size:.8rem;opacity:.65;margin-top:4px;}
.form-panel-dark .field-error{font-size:.8rem;color:#e0a898;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.form-panel-dark .field input.invalid,.form-panel-dark .field select.invalid,.form-panel-dark .field textarea.invalid{border-color:#e0a898;}
</style>
</head>

const PROXY_URL = 'https://cafe-gestalt-api-o5fr.vercel.app/api/send-email';

    if (!res.ok) console.error('Email send failed:', await res.text());
  } catch(e) {
    console.error('Email proxy error:', e);
  }
}

function genToken() {
  return Array.from(crypto.getRandomValues(new Uint8Array(18)))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function hoursUntil(isoDate) {
  const event = new Date(isoDate + 'T00:00:00');
  return (event - Date.now()) / 36e5;
}

async function supaFetch(path, opts = {}) {
  const url = SUPA_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPA_KEY,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  };
  const res = await fetch(url, { method: opts.method || 'GET', headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Supabase error ' + res.status + ': ' + err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// After a cancellation: notify the next unclaimed, un-notified waitlist person if >48h to event
async function promoteWaitlist(eventId, eventDate, eventLabel) {
  if (hoursUntil(eventDate) < 48) return; // window closed
  const list = await loadWaitlist(eventId);
  const next = list.find(w => !w.claimed && !w.notified);
  if (!next) return;
  const claimUrl = SITE_URL + '/#claim?token=' + next.claim_token;
  await sendEmail(
    next.email,
    'A seat has opened at Café Gestalt — ' + fmtDate(eventDate),
    emailWaitlistNotify(next.name, fmtDate(eventDate), eventLabel, claimUrl)
  );
  next.notified = true;
  await updateWaitlistEntry(next);
}

/* ===================== utils ===================== */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { weekday:'short', year:'numeric', month:'short', day:'numeric' });
}
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isFuture(iso) { return iso >= todayISO(); }
function reservedCount(list) { return list.reduce((s, r) => s + (parseInt(r.party_size) || 0), 0); }
function cupIcon(filled) {
  return '<svg class="cup-icon ' + (filled ? 'is-filled' : '') + '" viewBox="0 0 22 22" aria-hidden="true">'
    + '<path class="cup-body" d="M4 4h11v8a4.5 4.5 0 0 1-4.5 4.5h-2A4.5 4.5 0 0 1 4 12V4z"/>'
    + '<path class="cup-handle" d="M15 6.5h1.6a2 2 0 1 1 0 4H15"/>'
    + '<line class="cup-base" x1="5.5" y1="18.5" x2="13.5" y2="18.5"/></svg>';
}
function capacityWidget(capacity, reserved) {
  const cap = parseInt(capacity) || 0;
  const res = Math.min(reserved, cap);
  if (cap > 0 && cap <= 24) {
    let cups = '';
    for (let i = 0; i < cap; i++) cups += cupIcon(i < res);
    return '<div class="cup-row">' + cups + '</div>';
  }
  const pct = cap > 0 ? Math.min(100, Math.round((res / cap) * 100)) : 0;
  return '<div class="fill-bar"><div class="fill-bar-inner" style="width:' + pct + '%"></div></div>';
}
function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

async function renderReserve() {

  const shell = (innerHtml) => `

    <h1 class="sess-title">Session schedule</h1>
    ${innerHtml}

  if (!events.length) {

      ${noticeHtml ? `<div class="sess-list">${noticeHtml}</div>` : ''}
      <div class="sess-empty">No sessions are open for reservations right now. Check back soon.</div>
    `);
  }

  function buildAction(ev, spotsLeft, full, rsvpClosed, waitlistCount) {
    const formOpen = STATE.openReserveFormFor === ev.id;
    const waitlistOpen = STATE.openReserveFormFor === ev.id + '-waitlist';

  }

  function buildForm(ev, spotsLeft, full, rsvpClosed) {
    const formOpen = STATE.openReserveFormFor === ev.id;
    const waitlistOpen = STATE.openReserveFormFor === ev.id + '-waitlist';
    if (formOpen && !full && !rsvpClosed) {
      let options = '';
      for (let i = 1; i <= Math.min(spotsLeft, 8); i++)
        options += `<option value="${i}">${i} ${i===1?'seat':'seats'}</option>`;
      return `

        <form data-form="reserve" data-event-id="${ev.id}" novalidate>

          <button class="home-btn-outline" type="button" data-action="cancel-reserve-form" style="margin-left:8px;">Cancel</button>

      return `

        <div style="font-family:'IBM Plex Mono',monospace;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin-bottom:10px;">Join the waitlist</div>

  const [first, ...rest] = events;

  const fRes = await loadReservations(first.id);
  const fWl = await loadWaitlist(first.id);
  const fRc = reservedCount(fRes);
  const fCap = parseInt(first.capacity) || 0;
  const fSpotsLeft = Math.max(0, fCap - fRc);
  const fRsvpClosed = !isFuture(first.rsvp_by);
  const fFull = fSpotsLeft <= 0;
  const fWaitlistCount = fWl.filter(w => !w.claimed).length;
  const fd = new Date(first.date + 'T00:00:00');
  const fDayMonth = isNaN(fd) ? '' : fd.toLocaleDateString(undefined, { day:'2-digit', month:'short' });
  const fYear = isNaN(fd) ? '' : fd.getFullYear();

          ${buildForm(first, fSpotsLeft, fFull, fRsvpClosed)}
        </div>
      </div>
    </div>
  </div>`;

  let rowsHtml = '';
  for (const ev of rest) {
    const res = await loadReservations(ev.id);
    const wl = await loadWaitlist(ev.id);
    const rc = reservedCount(res);
    const cap = parseInt(ev.capacity) || 0;
    const spotsLeft = Math.max(0, cap - rc);
    const rsvpClosed = !isFuture(ev.rsvp_by);
    const full = spotsLeft <= 0;
    const waitlistCount = wl.filter(w => !w.claimed).length;

    rowsHtml += `
    <div class="sess-row">
      <div class="sess-row-top">
        <div class="sess-row-info">
          <div class="sess-row-date">${fmtDate(ev.date)}</div>
          <div class="sess-row-name">${ev.label ? escapeHtml(ev.label) : 'Café Gestalt session'}</div>
          <div class="sess-row-seats">${spotsLeft} of ${cap} seats available</div>
        </div>
        ${buildAction(ev, spotsLeft, full, rsvpClosed, waitlistCount)}
      </div>
      ${ev.notes ? `<div class="home-session-notes" style="margin-top:10px;">${escapeHtml(ev.notes)}</div>` : ''}
      ${buildForm(ev, spotsLeft, full, rsvpClosed)}
    </div>`;
  }

  return shell(`
    ${noticeHtml ? `<div class="sess-list" style="margin-bottom:0;">${noticeHtml}</div>` : ''}
    ${nextSessionHtml}
    ${rest.length ? `<div class="sess-list">${rowsHtml}</div>` : ''}
  `);
}

async function renderCancel() {
  const token = STATE.cancelToken;
  if (!token) return '<div class="empty-state">No cancellation token found.</div>';

  let rows;
  try {
    rows = await supaFetch('reservations?cancel_token=eq.' + token + '&select=*');
  } catch(e) {
    return '<div class="notice notice-error">Could not look up your reservation. Please try again.</div>';
  }

  if (!rows || !rows.length) {
    return `
      <h2 class="section-title">Cancel reservation</h2>

  }

  const r = rows[0];
  const ev = STATE.events.find(e => e.id === r.event_id);
  const eventDate = ev ? ev.date : '';
  const eventLabel = ev ? ev.label : '';
  const past = eventDate && !isFuture(eventDate);

  if (past) {
    return `

      <div class="card">This session has already taken place — nothing to cancel.</div>`;
  }

  let noticeHtml = STATE.notice ? `<div class="notice notice-${STATE.notice.type}">${escapeHtml(STATE.notice.text)}</div>` : '';
  return `
    <h2 class="section-title">Cancel reservation</h2>
    ${noticeHtml}

      </div>
      <p style="font-size:.9rem;opacity:.75;">Once cancelled, your seat will be released and the next person on the waitlist (if any) will be notified.</p>
      <form data-form="do-cancel" data-reservation-id="${r.id}" data-event-id="${r.event_id}" data-event-date="${eventDate}" data-event-label="${escapeHtml(eventLabel||'')}">
        <button class="btn btn-danger" type="submit" style="background:var(--brick);color:#fff;border:none;">Confirm cancellation</button>

async function renderClaim() {
  const token = STATE.claimToken;
  if (!token) return '<div class="empty-state">No claim token found.</div>';

  let rows;
  try {
    rows = await supaFetch('waitlist?claim_token=eq.' + token + '&select=*');
  } catch(e) {
    return '<div class="notice notice-error">Could not look up your waitlist entry. Please try again.</div>';
  }

  if (!rows || !rows.length) {
    return `<h2 class="section-title">Claim your seat</h2><div class="card">This link is invalid or has already been used.</div>`;
  }

  const w = rows[0];
  const ev = STATE.events.find(e => e.id === w.event_id);
  const eventDate = ev ? ev.date : '';
  const eventLabel = ev ? ev.label : '';

  if (w.claimed) {
    return `<h2 class="section-title">Claim your seat</h2><div class="card">You've already claimed your seat for ${fmtDate(eventDate)}. See you there!</div>`;
  }

  if (hoursUntil(eventDate) < 48) {
    return `<h2 class="section-title">Claim your seat</h2><div class="card">Sorry — the claim window for this session has closed (less than 48 hours to go).</div>`;
  }

  // Check there's still a seat
  const res = await loadReservations(w.event_id);
  const rc = reservedCount(res);
  const cap = ev ? parseInt(ev.capacity)||0 : 0;
  if (rc >= cap) {
    return `<h2 class="section-title">Claim your seat</h2><div class="card">Sorry — the seat was just taken by someone else. We'll be in touch if another opens up.</div>`;
  }

  let noticeHtml = STATE.notice ? `<div class="notice notice-${STATE.notice.type}">${escapeHtml(STATE.notice.text)}</div>` : '';
  return `
    <h2 class="section-title">Claim your seat</h2>
    ${noticeHtml}
    <div class="card">
      <p style="margin-top:0;">A seat is available for:</p>
      <div style="background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:14px;margin-bottom:16px;">
        <div style="font-weight:700;">${fmtDate(eventDate)}${eventLabel ? ' — '+escapeHtml(eventLabel) : ''}</div>
        <div class="field-hint">${escapeHtml(w.name)} · ${w.party_size} seat${w.party_size===1?'':'s'}</div>
      </div>
      <form data-form="do-claim" data-waitlist-id="${w.id}" data-event-id="${w.event_id}" data-event-date="${eventDate}" data-event-label="${escapeHtml(eventLabel||'')}">
        <button class="btn" type="submit">Confirm — claim my seat</button>
      </form>
    </div>`;
}

/* ===================== talk — calendar picker ===================== */
// Picker state lives outside render so selections survive re-draws
const TALK_PICKER = {
  openMonths: new Set(),   // 'YYYY-MM' strings of expanded months
  selectedDays: new Set()  // 'YYYY-MM-DD' strings of chosen days
};
let TALK_MODE = 'talk'; // 'talk' or 'theme'

function pickerMonthOptions() {
  // Build 12 months starting from current month
  const options = [];
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    options.push({ key, label });
  }
  return options;
}

function renderMonthGrid(yearMonth) {
  const [year, month] = yearMonth.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const todayStr = todayISO();

  let grid = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px;">';
  // Day headers
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    grid += `<div style="font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-align:center;opacity:.5;padding:2px 0;">${d}</div>`;
  });
  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) grid += '<div></div>';
  // Day cells
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isPast = iso < todayStr;
    const selected = TALK_PICKER.selectedDays.has(iso);
    const bg = selected ? 'var(--ochre)' : 'var(--paper)';
    const color = selected ? 'var(--ink)' : isPast ? 'var(--espresso)' : 'var(--espresso)';
    const opacity = isPast ? '.35' : '1';
    const cursor = isPast ? 'default' : 'pointer';
    grid += `<div
      data-action="pick-day" data-iso="${iso}" data-past="${isPast}"
      style="text-align:center;padding:5px 2px;border-radius:3px;font-size:.88rem;
             background:${bg};color:${color};opacity:${opacity};cursor:${cursor};
             border:1px solid ${selected ? 'var(--ochre-dark)' : 'var(--line)'};
             font-weight:${selected?'700':'400'};"
    >${day}</div>`;
  }
  grid += '</div>';

  // Selected days summary for this month
  const monthSelections = [...TALK_PICKER.selectedDays]
    .filter(d => d.startsWith(yearMonth))
    .map(d => new Date(d + 'T00:00:00').getDate())
    .sort((a,b) => a-b);
  if (monthSelections.length) {
    grid += `<div style="font-family:'IBM Plex Mono',monospace;font-size:.75rem;margin-top:8px;color:var(--ochre-dark);">Selected: ${monthSelections.join(', ')}</div>`;
  }
  return grid;
}

function renderCalendarPicker(label = 'Which dates could you present?') {
  const months = pickerMonthOptions();
  const totalSelected = TALK_PICKER.selectedDays.size;

  let html = label
    ? `<div class="field"><label>${label}</label>`
    : `<div class="field">`;
  if (label) html += '<div class="field-hint" style="margin-bottom:10px;">Open a month, then tap days that work for you. You can open multiple months.</div>';

  months.forEach(({ key, label }) => {
    const isOpen = TALK_PICKER.openMonths.has(key);
    const countInMonth = [...TALK_PICKER.selectedDays].filter(d => d.startsWith(key)).length;
    const badge = countInMonth > 0 ? ` <span style="font-family:'IBM Plex Mono',monospace;font-size:.7rem;background:var(--ochre);color:var(--ink);padding:1px 6px;border-radius:10px;margin-left:6px;">${countInMonth}</span>` : '';

    html += `<div style="border:1px solid var(--line);border-radius:4px;margin-bottom:6px;overflow:hidden;">
      <button type="button" data-action="toggle-month" data-month="${key}"
        style="width:100%;text-align:left;background:${isOpen?'var(--paper)':'var(--paper-light)'};
               border:none;padding:10px 12px;font-size:.95rem;cursor:pointer;
               display:flex;justify-content:space-between;align-items:center;">
        <span>${label}${badge}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:.8rem;opacity:.6;">${isOpen ? '▲ close' : '▼ open'}</span>
      </button>
      ${isOpen ? '<div style="padding:10px 12px 14px;">' + renderMonthGrid(key) + '</div>' : ''}
    </div>`;
  });

  if (totalSelected > 0) {
    const sorted = [...TALK_PICKER.selectedDays].sort();
    html += `<div style="margin-top:8px;padding:10px 12px;background:rgba(189,139,46,.1);border:1px solid var(--ochre);border-radius:4px;font-size:.88rem;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:.75rem;opacity:.7;">ALL SELECTED DATES</span><br/>
      ${sorted.map(d => fmtDate(d)).join(' · ')}
    </div>`;
  }

  html += '</div>';
  return html;
}

  return STATE.talks.map(t => {
    const dateOptions = upcomingEvents().map(ev =>
      `<option value="${ev.id}" ${t.assigned_event_id===ev.id?'selected':''}>${fmtDate(ev.date)}${ev.label?' — '+escapeHtml(ev.label):''}</option>`).join('');
    const availableLabels = (t.available_dates||[]).map(d => fmtDate(d)).filter(Boolean).join(', ') || '—';
    const statusClass = t.status === 'approved' ? 'badge-approved' : 'badge-pending';
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:700;">${escapeHtml(t.topic)} <span class="badge ${statusClass}">${t.status}</span> <span class="badge" style="background:var(--paper-dark);color:var(--espresso);">${t.submission_type === 'theme' ? 'Theme idea' : 'Talk'}</span></div>
          <div class="field-hint">${escapeHtml(t.name)} · ${escapeHtml(t.email)}</div>
        </div>
        <button class="btn-danger btn btn-small" data-action="delete-talk" data-id="${t.id}">Delete</button>
      </div>
      <p style="margin:10px 0;">${escapeHtml(t.description)}</p>
      <div class="field-hint" style="margin-bottom:10px;">Available: ${availableLabels}${t.notes ? ' · Notes: '+escapeHtml(t.notes) : ''}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <select data-role="assign-select" data-id="${t.id}" style="padding:6px 8px;border:1px solid var(--line-strong);border-radius:4px;">
          <option value="">Assign to a session…</option>${dateOptions}
        </select>
        <button class="btn btn-small" data-action="assign-talk" data-id="${t.id}">Save</button>
        ${t.status!=='approved' ? `<button class="btn btn-outline btn-small" data-action="approve-talk" data-id="${t.id}">Mark approved</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ===================== event delegation ===================== */
document.addEventListener('click', async (e) => {
  const navBtn = e.target.closest('[data-nav]');
  if (navBtn) { await navigate(navBtn.dataset.nav); return; }
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) {
    const openLinks = document.getElementById('homeNavLinks');
    const hamburger = document.getElementById('homeHamburger');
    if (openLinks && openLinks.classList.contains('is-open') && !e.target.closest('.home-nav')) {
      openLinks.classList.remove('is-open');
      hamburger.classList.remove('is-open');
      hamburger.setAttribute('aria-expanded', 'false');
    }
    return;
  }
  const action = actionEl.dataset.action;

  if (action === 'toggle-mobile-nav') {
    const links = document.getElementById('homeNavLinks');
    const isOpen = links.classList.toggle('is-open');
    actionEl.classList.toggle('is-open', isOpen);
    actionEl.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  } else if (action === 'scroll-how') {
    document.getElementById('home-how-it-works')?.scrollIntoView({ behavior:'smooth', block:'start' });
  } else if (action === 'toggle-diet-field') {
    const textarea = actionEl.closest('.field').querySelector('textarea[name="dietaryNeeds"]');
    if (textarea) {
      textarea.style.display = actionEl.checked ? 'none' : '';
      if (actionEl.checked) textarea.value = '';
    }
  } else if (action === 'set-talk-mode') {
    TALK_MODE = actionEl.dataset.mode;
    TALK_PICKER.openMonths.clear();
    TALK_PICKER.selectedDays.clear();
    await render();
  } else if (action === 'toggle-month') {
    const m = actionEl.dataset.month;
    if (TALK_PICKER.openMonths.has(m)) TALK_PICKER.openMonths.delete(m);
    else TALK_PICKER.openMonths.add(m);
    await render();
  } else if (action === 'pick-day') {
    if (actionEl.dataset.past === 'true') return;
    const iso = actionEl.dataset.iso;
    if (TALK_PICKER.selectedDays.has(iso)) TALK_PICKER.selectedDays.delete(iso);
    else TALK_PICKER.selectedDays.add(iso);
    await render();
  } else if (action === 'open-reserve-form') {
    STATE.openReserveFormFor = actionEl.dataset.eventId; await render();
  } else if (action === 'cancel-reserve-form') {
    STATE.openReserveFormFor = null; await render();
  } else if (action === 'admin-tab') {
    ADMIN_TAB = actionEl.dataset.tab; await render();
  } else if (action === 'lock-admin') {
    STATE.adminUnlocked = false; await render();
  } else if (action === 'open-edit-event') {
    STATE.openEditEventFor = actionEl.dataset.eventId; await render();
  } else if (action === 'cancel-edit-event') {
    STATE.openEditEventFor = null; await render();
  } else if (action === 'delete-event') {
    if (confirm('Delete this session? All reservations for it will also be deleted.')) {
      await deleteEvent(actionEl.dataset.eventId);
      STATE.events = await loadEvents();
      STATE.notice = { type:'success', text:'Session deleted.' }; await render();
    }
  } else if (action === 'delete-reservation') {
    if (confirm('Remove this reservation?')) {
      await deleteReservation(actionEl.dataset.id);
      STATE.notice = { type:'success', text:'Reservation removed.' }; await render();
    }
  } else if (action === 'delete-waitlist') {
    if (confirm('Remove this person from the waitlist?')) {
      await deleteWaitlistEntry(actionEl.dataset.id);
      STATE.notice = { type:'success', text:'Waitlist entry removed.' }; await render();
    }
  } else if (action === 'delete-talk') {
    if (confirm('Delete this talk proposal?')) {
      await deleteTalk(actionEl.dataset.id);
      STATE.talks = STATE.talks.filter(t => t.id !== actionEl.dataset.id);
      STATE.notice = { type:'success', text:'Talk proposal deleted.' }; await render();
    }
  } else if (action === 'approve-talk') {
    const t = STATE.talks.find(x => x.id === actionEl.dataset.id);
    if (t) { t.status = 'approved'; await updateTalk(t); STATE.notice = { type:'success', text:'Marked approved.' }; await render(); }
  } else if (action === 'assign-talk') {
    const sel = document.querySelector('select[data-role="assign-select"][data-id="'+actionEl.dataset.id+'"]');
    const t = STATE.talks.find(x => x.id === actionEl.dataset.id);
    if (t && sel) { t.assigned_event_id = sel.value || null; await updateTalk(t); STATE.notice = { type:'success', text:'Assignment saved.' }; await render(); }
  }
});

/* ===================== inline validation ===================== */
function validateForm(form, rules) {
  // Clear previous errors
  form.querySelectorAll('.field-error').forEach(el => el.remove());
  form.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));

  let valid = true;
  for (const [name, checks] of Object.entries(rules)) {
    const input = form.querySelector(`[name="${name}"]`);
    if (!input) continue;
    let error = null;
    const val = input.value.trim();
    if (checks.required && !val) {
      error = checks.required;
    } else if (checks.email && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      error = checks.email;
    }
    if (error) {
      valid = false;
      input.classList.add('invalid');
      const msg = document.createElement('div');
      msg.className = 'field-error';
      msg.textContent = error;
      input.closest('.field').appendChild(msg);
    }
  }
  // Scroll to first error
  if (!valid) {
    const first = form.querySelector('.invalid');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return valid;
}

document.addEventListener('submit', async (e) => {
  const form = e.target.closest('form[data-form]');
  if (!form) return;
  e.preventDefault();
  const type = form.dataset.form;
  const fd = new FormData(form);

  if (type === 'reserve') {
    const valid = validateForm(form, {
      name:  { required: 'Please enter your name.' },
      email: { required: 'Please enter your email.', email: 'Please enter a valid email address.' }
    });
    // Manual dietary check — must either tick no special needs or fill in the textarea
    const noSpecialDiet = form.querySelector('[name="noSpecialDiet"]').checked;
    const dietaryNeeds = (fd.get('dietaryNeeds')||'').trim();
    if (!noSpecialDiet && !dietaryNeeds) {
      valid === false || null; // keep going to show dietary error
      form.querySelector('[name="dietaryNeeds"]').classList.add('invalid');
      const existing = form.querySelector('[name="dietaryNeeds"]').closest('.field').querySelector('.field-error');
      if (!existing) {
        const msg = document.createElement('div');
        msg.className = 'field-error';
        msg.textContent = 'Please describe your dietary needs, or tick "No special dietary needs".';
        form.querySelector('[name="dietaryNeeds"]').closest('.field').appendChild(msg);
      }
      if (!valid) return;
      return;
    }
    if (!valid) return;
    const eventId = form.dataset.eventId;
    const ev = STATE.events.find(x => x.id === eventId);
    const partySize = parseInt(fd.get('partySize')) || 1;
    const res = await loadReservations(eventId);
    const rc = reservedCount(res);
    if (rc + partySize > (parseInt(ev.capacity) || 0)) {
      STATE.notice = { type:'error', text:'Sorry — that session just filled up. Try a smaller party or another date.' };
    } else {
      const reservation = await addReservation(eventId, { name:fd.get('name'), email:fd.get('email'), partySize, notes:fd.get('notes')||'', dietaryNeeds: noSpecialDiet ? 'No special dietary needs' : dietaryNeeds });
      if (reservation) {
        const cancelUrl = SITE_URL + '/#cancel?token=' + reservation.cancel_token;
        await sendEmail(
          fd.get('email'),
          'Your reservation — Café Gestalt ' + fmtDate(ev.date),
          emailConfirmation(fd.get('name'), fmtDate(ev.date), ev.label||'', cancelUrl)
        );
      }
      STATE.notice = { type:'success', text:"You're booked! Check your email for a confirmation and cancellation link." };
    }
    STATE.openReserveFormFor = null; await render();

  } else if (type === 'waitlist') {
    const valid = validateForm(form, {
      name:  { required: 'Please enter your name.' },
      email: { required: 'Please enter your email.', email: 'Please enter a valid email address.' }
    });
    if (!valid) return;
    const eventId = form.dataset.eventId;
    const ev = STATE.events.find(x => x.id === eventId);
    await addToWaitlist(eventId, { name:fd.get('name'), email:fd.get('email'), partySize:1, notes:fd.get('notes')||'' });
    STATE.notice = { type:'success', text:"You're on the waitlist. We'll email you if a seat opens up." };
    STATE.openReserveFormFor = null; await render();

  } else if (type === 'do-cancel') {
    const reservationId = form.dataset.reservationId;
    const eventId       = form.dataset.eventId;
    const eventDate     = form.dataset.eventDate;
    const eventLabel    = form.dataset.eventLabel;
    await deleteReservation(reservationId);
    await promoteWaitlist(eventId, eventDate, eventLabel);
    STATE.cancelToken = null;
    STATE.view = 'home';
    STATE.notice = { type:'success', text:'Your reservation has been cancelled.' };
    await refreshCore();
    await render();

  } else if (type === 'do-claim') {
    const waitlistId = form.dataset.waitlistId;
    const eventId    = form.dataset.eventId;
    const eventDate  = form.dataset.eventDate;
    const eventLabel = form.dataset.eventLabel;
    const ev = STATE.events.find(x => x.id === eventId);

    // Re-check capacity
    const res = await loadReservations(eventId);
    const rc = reservedCount(res);
    const cap = ev ? parseInt(ev.capacity)||0 : 0;
    if (rc >= cap) {
      STATE.notice = { type:'error', text:'Sorry — the seat was just taken. We\'ll be in touch if another opens up.' };
      await render(); return;
    }

    // Get waitlist entry for name/email
    const wRows = await supaFetch('waitlist?id=eq.' + waitlistId + '&select=*');
    const w = wRows && wRows[0];
    if (!w) { STATE.notice = { type:'error', text:'Could not find your waitlist entry.' }; await render(); return; }

    // Create reservation
    const reservation = await addReservation(eventId, { name:w.name, email:w.email, partySize:w.party_size, notes:w.notes||'' });

    // Mark waitlist entry as claimed
    w.claimed = true;
    await updateWaitlistEntry(w);

    // Send confirmation
    if (reservation) {
      const cancelUrl = SITE_URL + '/#cancel?token=' + reservation.cancel_token;
      await sendEmail(
        w.email,
        'Your seat is confirmed — Café Gestalt ' + fmtDate(eventDate),
        emailWaitlistConfirm(w.name, fmtDate(eventDate), eventLabel, cancelUrl)
      );
    }
    STATE.notice = { type:'success', text:"You're booked! Check your email for confirmation." };
    STATE.claimToken = null;
    STATE.view = 'home';
    await render();

  } else if (type === 'talk') {
    const valid = validateForm(form, {
      name:        { required: 'Please enter your name.' },
      email:       { required: 'Please enter your email.', email: 'Please enter a valid email address.' },
      topic:       { required: 'Please enter a topic or title for your talk.' },
      description: { required: 'Please add a short description of your talk.' }
    });
    if (!valid) return;
    const availableDates = [...TALK_PICKER.selectedDays].sort();
    await addTalk({ name:fd.get('name'), email:fd.get('email'), topic:fd.get('topic'), description:fd.get('description'), availableDates, notes:fd.get('notes')||'', type:'talk' });
    TALK_PICKER.openMonths.clear();
    TALK_PICKER.selectedDays.clear();
    TALK_MODE = 'talk';
    STATE.notice = { type:'success', text:"Thanks! We'll follow up to confirm a date." };
    form.reset(); await render();

  } else if (type === 'theme') {
    const valid = validateForm(form, {
      name:        { required: 'Please enter your name.' },
      email:       { required: 'Please enter your email.', email: 'Please enter a valid email address.' },
      topic:       { required: 'Please give your theme idea a title.' },
      description: { required: 'Please add a short description of your idea.' }
    });
    if (!valid) return;
    const availableDates = [...TALK_PICKER.selectedDays].sort();
    await addTalk({ name:fd.get('name'), email:fd.get('email'), topic:fd.get('topic'), description:fd.get('description'), availableDates, notes:fd.get('notes')||'', type:'theme' });
    TALK_PICKER.openMonths.clear();
    TALK_PICKER.selectedDays.clear();
    TALK_MODE = 'talk';
    STATE.notice = { type:'success', text:"Thanks for the idea! We'll be in touch." };
    form.reset(); await render();

  } else if (type === 'set-passcode') {
    await savePasscode(fd.get('passcode'));
    STATE.adminUnlocked = true;
    STATE.notice = { type:'success', text:'Passcode set. Welcome in.' }; await render();

  } else if (type === 'unlock-admin') {
    const code = await loadPasscode();
    if (fd.get('passcode') === code) { STATE.adminUnlocked = true; STATE.notice = null; }
    else { STATE.notice = { type:'error', text:'Incorrect passcode.' }; }
    await render();

  } else if (type === 'cafe-info') {
    STATE.cafeInfo = { name:fd.get('name'), tagline:fd.get('tagline'), about:fd.get('about'), address:fd.get('address'), hours:fd.get('hours'), how_it_works:fd.get('how_it_works')||'' };
    await saveCafeInfo(STATE.cafeInfo);
    STATE.notice = { type:'success', text:'Cafe info saved.' }; await render();

  } else if (type === 'create-event') {
    await createEvent({ date:fd.get('date'), rsvpBy:fd.get('rsvpBy'), capacity:parseInt(fd.get('capacity'))||1, label:fd.get('label')||'', notes:fd.get('notes')||'' });
    STATE.events = await loadEvents();
    STATE.notice = { type:'success', text:'Session created.' }; await render();

  } else if (type === 'edit-event') {
    await updateEvent({ id:form.dataset.eventId, date:fd.get('date'), rsvpBy:fd.get('rsvpBy'), capacity:parseInt(fd.get('capacity'))||1, label:fd.get('label')||'', notes:fd.get('notes')||'' });
    STATE.events = await loadEvents();
    STATE.openEditEventFor = null;
    STATE.notice = { type:'success', text:'Session updated.' }; await render();
  }
});

/* ===================== init ===================== */
window.addEventListener('hashchange', async () => {
  const hash = window.location.hash.replace('#','');
  if (hash.startsWith('cancel?token=')) {
    STATE.cancelToken = hash.replace('cancel?token=', '');
    STATE.view = 'cancel';
  } else if (hash.startsWith('claim?token=')) {
    STATE.claimToken = hash.replace('claim?token=', '');
    STATE.view = 'claim';
  } else {
    STATE.view = hash || 'home';
  }
  setActiveTab(); await render();
});

(async function init() {
  await refreshCore();
  const hash = window.location.hash.replace('#','');

  // Handle cancel?token=xxx and claim?token=xxx
  if (hash.startsWith('cancel?token=')) {
    STATE.cancelToken = hash.replace('cancel?token=', '');
    STATE.view = 'cancel';
  } else if (hash.startsWith('claim?token=')) {
    STATE.claimToken = hash.replace('claim?token=', '');
    STATE.view = 'claim';
  } else {
    STATE.view = hash || 'home';
  }

  setActiveTab(); await render();
})();
</script>
